name: atlas-brain
description: Salva notas no segundo cérebro (vault Obsidian) seguindo as convenções do vault
version: 1.0.0
author: eufelipe

targets:
  - claude-code

config:
  vault_path:
    type: string
    required: true
    prompt: 'Qual o caminho do seu vault Obsidian?'
    validate: 'existsAndIsObsidianVault'

files:
  - template: template.md
    targets:
      claude-code: '~/.claude/skills/atlas-brain/SKILL.md'
    mode: replace-with-confirm
